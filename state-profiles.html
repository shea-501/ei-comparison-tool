alization": "Legalized", "seProgram": "Yes", "seProgramDetails": "The program aims to promote equitable participation and business ownership in the cannabis industry through financial assistance, reduced fees, and other forms of support.\n\nThe Social Equity Assistance Fund is created to provide grants, reduce or waive fees, and support initiatives like job training, mentoring, technical assistance, and restorative justice. The fund is financed by licensing fees, penalties, and interest, and it is administered by a commission in consultation with the cannabis advisory board. The commission will set eligibility criteria, qualifications, and processes for distributing funds.\n\nSocial equity applicants may qualify for up to 100% fee waivers, and those denied social equity status have opportunities to provide additional evidence or proceed as non-social equity applicants. Licenses granted to social equity applicants can only be transferred to other qualified social equity applicants, ensuring the program's benefits remain within its intended scope.\n\nAnnual reports to the governor and general assembly will track the program's effectiveness, including the number of grants awarded, financial assistance provided, new jobs created, and the economic impact. Licensed cannabis establishments must report annually on diversity in the industry and barriers to entry, with noncompliance subject to disciplinary action.\n\nOverall, the program emphasizes reducing financial and systemic barriers to support equitable access to the cannabis industry while addressing the historical harms of cannabis law enforcement.", "yearMedLaw": 2006.0, "yearAULaw": 2022.0, "yearAUSales": 2022.0, "summary": "[Rhode_Island Summary]"}, "governingBodies": [{"name": "RI Cannabis Control Commission", "shortName": "CCC", "website": "https://ccc.ri.gov/", "designations": "Adult Use, Medical"}, {"name": "RI Dept. of Business Regulation", "shortName": "DBR", "website": "https://dbr.ri.gov/office-cannabis-reg function Badge({ label, style }) {
  return (
    <span style={{
      display: "inline-block",
      fontSize: 11,
      fontWeight: 500,
      padding: "2px 8px",
      borderRadius: 4,
      border: `0.5px solid ${style?.border || "transparent"}`,
      background: style?.bg || "#F1EFE8",
      color: style?.color || "#444441",
      whiteSpace: "nowrap",
      ...style,
    }}>{label}</span>
  );
}

function Tab({ label, active, onClick, count }) {
  return (
    <button onClick={onClick} style={{
      background: "none",
      border: "none",
      borderBottom: active ? "2px solid var(--color-text-primary)" : "2px solid transparent",
      color: active ? "var(--color-text-primary)" : "var(--color-text-secondary)",
      fontSize: 13,
      fontWeight: active ? 500 : 400,
      padding: "8px 12px",
      cursor: "pointer",
      display: "flex",
      alignItems: "center",
      gap: 6,
    }}>
      {label}
      {count !== undefined && (
        <span style={{ fontSize: 11, background: "var(--color-background-secondary)", borderRadius: 10, padding: "1px 6px", color: "var(--color-text-secondary)" }}>
          {count}
        </span>
      )}
    </button>
  );
}

  const legStyle = LEG_COLORS[info.legalization] || LEG_COLORS["Not Legal"];
  return (
    <div style={{ padding: "16px 0" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 10, marginBottom: 20 }}>
        {[
          { label: "Legalization", value: info.legalization || "Unknown", badge: legStyle },
          { label: "Med law passed", value: info.yearMedLaw && info.yearMedLaw !== "-" ? Math.round(info.yearMedLaw) : "—" },
          { label: "AU law passed", value: info.yearAULaw && info.yearAULaw !== "-" ? Math.round(info.yearAULaw) : "—" },
          { label: "AU sales start", value: info.yearAUSales && info.yearAUSales !== "-" ? Math.round(info.yearAUSales) : "—" },
        ].map(({ label, value, badge }) => (
          <div key={label} style={{ background: "var(--color-background-secondary)", borderRadius: 8, padding: "10px 12px" }}>
            <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 4 }}>{label}</div>
            {badge
              ? <Badge label={value} style={badge} />
              : <div style={{ fontSize: 16, fontWeight: 500 }}>{value}</div>
            }
          </div>
        ))}
      </div>

      {info.summary && info.summary !== "None" && !info.summary.startsWith("[") && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.05em" }}>Overview</div>
          <p style={{ fontSize: 13, lineHeight: 1.65, color: "var(--color-text-secondary)", margin: 0 }}>{info.summary}</p>
        </div>
      )}

      {info.seProgram && info.seProgram !== "null" && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-secondary)", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>Social equity program</div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>{info.seProgram}</div>
          {info.seProgramDetails && <p style={{ fontSize: 12, color: "var(--color-text-secondary)", margin: 0, lineHeight: 1.6 }}>{info.seProgramDetails}</p>}
        </div>
      )}

      {governingBodies.length > 0 && (
        <div>
          <div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-secondary)", marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.05em" }}>Regulatory bodies</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {governingBodies.map((gb, i) => (
              <div key={i} style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: 8, padding: "10px 12px", background: "var(--color-background-primary)" }}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 2 }}>
                      {gb.shortName && <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, background: "var(--color-background-secondary)", padding: "1px 5px", borderRadius: 3, marginRight: 6 }}>{gb.shortName}</span>}
                      {gb.name}
                    </div>
                    {gb.website && (
                      <a href={gb.website} style={{ fontSize: 11, color: "var(--color-text-info)", textDecoration: "none" }}>{gb.website.replace("https://", "")}</a>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {gb.designations && gb.designations.split(",").map(d => d.trim()).map(d => (
                      <Badge key={d} label={d} style={DESIG_COLORS[d] || {}} />
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function StatusTab({ statusMap }) {
  const entries = Object.entries(statusMap);
  if (entries.length === 0) return <div style={{ padding: "24px 0", color: "var(--color-text-secondary)", fontSize: 13 }}>No status mappings recorded for this locale.</div>;
  return (
    <div style={{ padding: "16px 0" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr style={{ borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
            {["Official status", "EI status", "Location status", "Flag"].map(h => (
              <th key={h} style={{ textAlign: "left", padding: "6px 10px 8px", fontSize: 11, color: "var(--color-text-secondary)", fontWeight: 500 }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {entries.map(([official, mapping]) => (
            <tr key={official} style={{ borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
              <td style={{ padding: "8px 10px", color: "var(--color-text-primary)" }}>{official}</td>
              <td style={{ padding: "8px 10px" }}>
                {mapping.eiStatus
                  ? <Badge label={mapping.eiStatus} style={EI_STATUS_COLORS[mapping.eiStatus] || {}} />
                  : <span style={{ color: "var(--color-text-tertiary)", fontSize: 12 }}>unmapped</span>
                }
              </td>
              <td style={{ padding: "8px 10px" }}>
                {mapping.locationStatus
                  ? <Badge label={mapping.locationStatus} style={LOC_STATUS_COLORS[mapping.locationStatus] || {}} />
                  : <span style={{ color: "var(--color-text-tertiary)", fontSize: 12 }}>—</span>
                }
              </td>
              <td style={{ padding: "8px 10px" }}>
                {mapping.doNotLoad && <Badge label="DO NOT LOAD" style={{ bg: "#FCEBEB", color: "#791F1F", border: "#F7C1C1" }} />}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function LicenseTypesTab({ licenseTypes }) {
  const entries = Object.entries(licenseTypes);
  if (entries.length === 0) return <div style={{ padding: "24px 0", color: "var(--color-text-secondary)", fontSize: 13 }}>No license type mappings recorded for this locale.</div>;
  const catColors = {
    "Retailer": { bg: "#E6F1FB", color: "#0C447C" },
    "Cultivation": { bg: "#EAF3DE", color: "#27500A" },
    "Delivery": { bg: "#EEEDFE", color: "#3C3489" },
    "Distributor": { bg: "#FAEEDA", color: "#633806" },
    "Product Manufacturer": { bg: "#FAECE7", color: "#712B13" },
    "Testing/Research Lab": { bg: "#F1EFE8", color: "#444441" },
    "Transporter": { bg: "#FBEAF0", color: "#72243E" },
    "Operator": { bg: "#E6F1FB", color: "#185FA5" },
    "Consumption Lounge": { bg: "#EEEDFE", color: "#534AB7" },
    "Event": { bg: "#FAEEDA", color: "#854F0B" },
    "Microbusiness": { bg: "#EAF3DE", color: "#3B6D11" },
    "Adult Use": { bg: "#EAF3DE", color: "#27500A" },
    "Medical": { bg: "#E6F1FB", color: "#0C447C" },
    "Hemp": { bg: "#FAEEDA", color: "#633806" },
  };
  return (
    <div style={{ padding: "16px 0" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {entries.map(([official, lt]) => (
          <div key={official} style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: 8, padding: "10px 14px", background: "var(--color-background-primary)" }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 3 }}>{official}</div>
                {lt.eiLicenseType && lt.eiLicenseType !== "None" && (
                  <div style={{ fontSize: 11, color: "var(--color-text-secondary)", fontFamily: "var(--font-mono)" }}>→ {lt.eiLicenseType}</div>
                )}
              </div>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", justifyContent: "flex-end" }}>
                {lt.categories.slice(0, 6).map(cat => (
                  <Badge key={cat} label={cat} style={catColors[cat] ? { bg: catColors[cat].bg, color: catColors[cat].color } : {}} />
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function StateProfiles() {
  const [search, setSearch] = useState("");
  const [selectedLocale, setSelectedLocale] = useState("CA-California");
  const [activeTab, setActiveTab] = useState("overview");
  const [legFilter, setLegFilter] = useState("All");

  const allLocales = useMemo(() => {
    return Object.entries(EI_DATA)
      .filter(([k]) => k !== "ZZ-Test_Locale")
      .sort((a, b) => (a[1].info?.commonName || a[0]).localeCompare(b[1].info?.commonName || b[0]));
  }, []);

  const filtered = useMemo(() => {
    return allLocales.filter(([key, val]) => {
      const name = (val.info?.commonName || key).toLowerCase();
      const abbr = (val.info?.abbr || "").toLowerCase();
      const matchesSearch = name.includes(search.toLowerCase()) || abbr.includes(search.toLowerCase()) || key.toLowerCase().includes(search.toLowerCase());
      const matchesLeg = legFilter === "All" || val.info?.legalization === legFilter;
      return matchesSearch && matchesLeg;
    });
  }, [allLocales, search, legFilter]);

  const selected = EI_DATA[selectedLocale];
  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "status", label: "Status map", count: Object.keys(selected?.statusMap || {}).length },
    { id: "licenses", label: "License types", count: Object.keys(selected?.licenseTypes || {}).length },
  ];

  const legOptions = ["All", "Legalized", "Medical", "Hemp Only", "Not Legal"];
  const legCounts = useMemo(() => {
    const counts = { All: allLocales.length };
    allLocales.forEach(([, v]) => {
      const l = v.info?.legalization || "Not Legal";
      counts[l] = (counts[l] || 0) + 1;
    });
    return counts;
  }, [allLocales]);

  return (
    <div style={{ display: "flex", height: 600, border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, overflow: "hidden", fontFamily: "var(--font-sans)" }}>
      <div style={{ width: 220, minWidth: 220, borderRight: "0.5px solid var(--color-border-tertiary)", display: "flex", flexDirection: "column", background: "var(--color-background-secondary)" }}>
        <div style={{ padding: "12px 10px 8px" }}>
          <input
            type="text"
            placeholder="Search states..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{ width: "100%", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }}
          />
        </div>
        <div style={{ padding: "4px 10px 8px", display: "flex", gap: 4, flexWrap: "wrap" }}>
          {legOptions.map(opt => (
            <button key={opt} onClick={() => setLegFilter(opt)} style={{
              fontSize: 10, padding: "2px 6px", borderRadius: 4, cursor: "pointer",
              background: legFilter === opt ? "var(--color-background-primary)" : "transparent",
              border: legFilter === opt ? "0.5px solid var(--color-border-secondary)" : "0.5px solid transparent",
              color: legFilter === opt ? "var(--color-text-primary)" : "var(--color-text-secondary)",
              fontWeight: legFilter === opt ? 500 : 400,
            }}>
              {opt} {legCounts[opt] ? `(${legCounts[opt]})` : ""}
            </button>
          ))}
        </div>
        <div style={{ flex: 1, overflowY: "auto" }}>
          {filtered.map(([key, val]) => {
            const active = key === selectedLocale;
            const legStyle = LEG_COLORS[val.info?.legalization] || { bg: "#F1EFE8", color: "#444441" };
            return (
              <button
                key={key}
                onClick={() => { setSelectedLocale(key); setActiveTab("overview"); }}
                style={{
                  display: "flex", alignItems: "center", width: "100%",
                  background: active ? "var(--color-background-primary)" : "transparent",
                  border: "none", borderLeft: active ? "2px solid var(--color-text-primary)" : "2px solid transparent",
                  padding: "7px 10px", cursor: "pointer", textAlign: "left", gap: 8,
                }}
              >
                <div style={{ width: 28, height: 28, borderRadius: 6, background: legStyle.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 10, fontWeight: 500, color: legStyle.color, fontFamily: "var(--font-mono)" }}>{val.info?.abbr || key.slice(0, 2)}</span>
                </div>
                <div style={{ overflow: "hidden" }}>
                  <div style={{ fontSize: 12, fontWeight: active ? 500 : 400, color: "var(--color-text-primary)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {val.info?.commonName || key}
                  </div>
                  <div style={{ fontSize: 10, color: "var(--color-text-secondary)" }}>{val.info?.legalization || "—"}</div>
                </div>
              </button>
            );
          })}
          {filtered.length === 0 && (
            <div style={{ padding: "20px 12px", fontSize: 12, color: "var(--color-text-secondary)" }}>No results</div>
          )}
        </div>
        <div style={{ padding: "8px 10px", borderTop: "0.5px solid var(--color-border-tertiary)", fontSize: 10, color: "var(--color-text-tertiary)" }}>
          {filtered.length} / {allLocales.length} locales
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {selected ? (
          <>
            <div style={{ padding: "14px 20px 0", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <div style={{ fontSize: 18, fontWeight: 500 }}>{selected.info?.commonName || selectedLocale}</div>
                <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--color-text-secondary)", background: "var(--color-background-secondary)", padding: "2px 6px", borderRadius: 4 }}>
                  {selectedLocale}
                </span>
                {selected.info?.legalization && (
                  <Badge label={selected.info.legalization} style={LEG_COLORS[selected.info.legalization] || {}} />
                )}
              </div>
              <div style={{ display: "flex", gap: 0 }}>
                {tabs.map(t => (
                  <Tab key={t.id} label={t.label} count={t.count} active={activeTab === t.id} onClick={() => setActiveTab(t.id)} />
                ))}
              </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 20px" }}>
              {activeTab === "overview" && <OverviewTab locale={selectedLocale} info={selected.info || {}} governingBodies={selected.governingBodies || []} />}
              {activeTab === "status" && <StatusTab statusMap={selected.statusMap || {}} />}
              {activeTab === "licenses" && <LicenseTypesTab licenseTypes={selected.licenseTypes || {}} />}
            </div>
          </>
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", flex: 1, color: "var(--color-text-secondary)", fontSize: 13 }}>
            Select a state to view its profile
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(StateProfiles));
  </script>
</body>
</html>
