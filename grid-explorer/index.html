<script type="text/babel">
const { useState, useMemo } = React;

const GRID = window.GRID_DATA;
const STATES = Object.keys(GRID).sort();

const FIELD_ORDER = [
  "License Type", "Primary Business Type", "Facility Type",
  "License Status", "State License Status", "Designation",
  "Cultivation Tier", "Grow Environment", "License Type Sub-Types"
];

const FIELD_COLORS = {
  "License Type": "#38bdf8",
  "Primary Business Type": "#a78bfa",
  "Facility Type": "#34d399",
  "License Status": "#fbbf24",
  "State License Status": "#f97316",
  "Designation": "#f472b6",
  "Cultivation Tier": "#2dd4bf",
  "Grow Environment": "#4ade80",
  "License Type Sub-Types": "#818cf8",
};

const FIELD_LABELS = {
  "License Type": "License Type",
  "Primary Business Type": "Business Type",
  "Facility Type": "Facility Type",
  "License Status": "License Status",
  "State License Status": "State License Status",
  "Designation": "Designation",
  "Cultivation Tier": "Cultivation Tier",
  "Grow Environment": "Grow Environment",
  "License Type Sub-Types": "License Sub-Types",
};

const C = {
  bg: "#0a0f1a", card: "#111827", border: "#1e293b",
  text: "#e2e8f0", dim: "#94a3b8", muted: "#64748b",
  accent: "#38bdf8",
};

function NewEiBadge({ val }) {
  if (!val) return null;
  const colors = {
    "after 6/14/23": { bg: "#1e3a5f", color: "#60a5fa" },
    "POST SPLIT": { bg: "#4c1d95", color: "#a78bfa" },
    "DO NOT LOAD": { bg: "#7f1d1d", color: "#f87171" },
  };
  const style = colors[val] || { bg: "#1e293b", color: "#94a3b8" };
  return (
    <span style={{
      fontSize: 10, fontWeight: 600, padding: "2px 6px", borderRadius: 3,
      background: style.bg, color: style.color, marginLeft: 6, whiteSpace: "nowrap"
    }}>{val}</span>
  );
}

function GridExplorer() {
  const [selectedState, setSelectedState] = useState(null);
  const [search, setSearch] = useState("");
  const [expandedField, setExpandedField] = useState(null);
  const [searchAll, setSearchAll] = useState("");

  const profile = selectedState ? GRID[selectedState] : null;

  const fields = useMemo(() => {
    if (!profile) return [];
    return FIELD_ORDER.filter(f => profile[f] && profile[f].length > 0);
  }, [profile]);

  const filteredMappings = useMemo(() => {
    if (!profile || !expandedField) return [];
    const mappings = profile[expandedField] || [];
    if (!search) return mappings;
    const s = search.toLowerCase();
    return mappings.filter(m =>
      m.raw.toLowerCase().includes(s) ||
      m.ei.toLowerCase().includes(s) ||
      (m.new_ei && m.new_ei.toLowerCase().includes(s))
    );
  }, [profile, expandedField, search]);

  const crossResults = useMemo(() => {
    if (!searchAll || searchAll.length < 2) return [];
    const s = searchAll.toLowerCase();
    const results = [];
    for (const state of STATES) {
      for (const field of Object.keys(GRID[state])) {
        for (const m of GRID[state][field]) {
          if (m.raw.toLowerCase().includes(s) || m.ei.toLowerCase().includes(s)) {
            results.push({ state, field, ...m });
            if (results.length >= 100) return results;
          }
        }
      }
    }
    return results;
  }, [searchAll]);

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ padding: "16px 24px", borderBottom: "1px solid " + C.border, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 10, height: 10, borderRadius: 10, background: "#a78bfa", boxShadow: "0 0 8px #a78bfa66" }} />
          <span style={{ fontSize: 16, fontWeight: 700, letterSpacing: 1 }}>GRID STATE PROFILES</span>
          <span style={{ fontSize: 11, color: C.muted, marginLeft: 8 }}>Taxonomy & Enumerations Reference</span>
        </div>
        <a href="../" style={{ fontSize: 11, color: C.accent, textDecoration: "none", padding: "5px 12px", border: "1px solid " + C.accent + "33", borderRadius: 6 }}>
          ← Comparison Tool
        </a>
      </div>

      <div style={{ display: "flex", minHeight: "calc(100vh - 53px)" }}>
        {/* Sidebar */}
        <div style={{ width: 220, borderRight: "1px solid " + C.border, padding: "12px 0", overflowY: "auto", flexShrink: 0, maxHeight: "calc(100vh - 53px)", position: "sticky", top: 53 }}>
          <div style={{ padding: "0 12px 12px" }}>
            <input
              value={searchAll}
              onChange={e => { setSearchAll(e.target.value); if (e.target.value) setSelectedState(null); }}
              placeholder="Search all states..."
              style={{
                width: "100%", padding: "7px 10px", background: C.card, border: "1px solid " + C.border,
                borderRadius: 4, color: C.text, fontFamily: "inherit", fontSize: 12, outline: "none",
                boxSizing: "border-box"
              }}
            />
          </div>
          {STATES.map(s => {
            const mapCount = Object.values(GRID[s]).reduce((a, b) => a + b.length, 0);
            return (
              <button key={s} onClick={() => { setSelectedState(s); setExpandedField(null); setSearch(""); setSearchAll(""); }}
                style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  width: "100%", padding: "8px 16px", border: "none", cursor: "pointer",
                  background: selectedState === s ? C.accent + "18" : "transparent",
                  borderLeft: selectedState === s ? "3px solid " + C.accent : "3px solid transparent",
                  color: selectedState === s ? C.accent : C.dim,
                  fontFamily: "inherit", fontSize: 12, fontWeight: selectedState === s ? 600 : 400,
                  textAlign: "left"
                }}>
                <span>{s}</span>
                <span style={{ fontSize: 10, opacity: 0.5 }}>{mapCount}</span>
              </button>
            );
          })}

        <div style={{ flex: 1, padding: 24, overflowY: "auto" }}>
          {/* Cross-state search */}
          {searchAll && searchAll.length >= 2 && (
            <div>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>
                Search results for \"{searchAll}\"
                <span style={{ fontSize: 11, color: C.muted, marginLeft: 8 }}>
                  {crossResults.length}{crossResults.length >= 100 ? "+" : ""} matches
                </span>
              </div>
              {crossResults.length === 0 ? (
                <div style={{ color: C.muted, padding: 24 }}>No mappings found</div>
              ) : (
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead>
                    <tr style={{ borderBottom: "1px solid " + C.border }}>
                      {["State", "Field", "Raw Value", "EI Value", "Version"].map(h => (
                        <th key={h} style={{ padding: "8px", textAlign: "left", color: C.muted, fontSize: 11, fontWeight: 600 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {crossResults.map((r, i) => (
                      <tr key={i} style={{ borderBottom: "1px solid " + C.border + "44", cursor: "pointer" }}
                        onClick={() => { setSelectedState(r.state); setExpandedField(r.field); setSearchAll(""); setSearch(""); }}>
                        <td style={{ padding: 8, color: C.accent }}>{r.state}</td>
                        <td style={{ padding: 8, color: FIELD_COLORS[r.field] || C.dim, fontSize: 11 }}>{r.field}</td>
                        <td style={{ padding: 8 }}>{r.raw}</td>
                        <td style={{ padding: 8, color: C.dim }}>{r.ei}</td>
                        <td style={{ padding: 8 }}><NewEiBadge val={r.new_ei} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

              <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{selectedState}</div>
              <div style={{ fontSize: 12, color: C.muted, marginBottom: 24 }}>
                {fields.length} field types,{" "}
                {fields.reduce((a, f) => a + (profile[f]?.length || 0), 0)} total mappings
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {fields.map(f => {
                  const mappings = profile[f] || [];
                  const isExpanded = expandedField === f;
                  const color = FIELD_COLORS[f] || C.accent;
                  return (
                    <div key={f} style={{ background: C.card, borderRadius: 8, border: "1px solid " + C.border, overflow: "hidden" }}>
                      <button onClick={() => { setExpandedField(isExpanded ? null : f); setSearch(""); }}
                        style={{
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                          width: "100%", padding: "14px 20px", border: "none", cursor: "pointer",
                          background: "transparent", color: C.text, fontFamily: "inherit", fontSize: 13,
                          fontWeight: 600, textAlign: "left"
                        }}>
                        <span>
                          <span style={{ color, marginRight: 8 }}>&#9679;</span>
                          {FIELD_LABELS[f] || f}
                          <span style={{ color: C.muted, fontWeight: 400, marginLeft: 8, fontSize: 11 }}>
                            {mappings.length} mapping{mappings.length !== 1 ? "s" : ""}
                          </span>
                        </span>
                        <span style={{ color: C.muted, fontSize: 16 }}>{isExpanded ? "\u2212" : "+"}</span>
                      </button>

                      {isExpanded && (
                        <div style={{ padding: "0 20px 16px" }}>
                          {mappings.length > 5 && (
                            <input
                              value={search}
                              onChange={e => setSearch(e.target.value)}
                              placeholder={"Filter " + (FIELD_LABELS[f] || f).toLowerCase() + " mappings..."}
                              style={{
                                width: "100%", padding: "7px 10px", marginBottom: 12,
                                background: C.bg, border: "1px solid " + C.border, borderRadius: 4,
                                color: C.text, fontFamily: "inherit", fontSize: 12, outline: "none",
                                boxSizing: "border-box"
                              }}
                            />
                          )}
                          <table style={{ width: "100%", borderCollapse: "collapse" }}>
                            <thead>
                              <tr style={{ borderBottom: "1px solid " + C.border }}>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.muted, fontSize: 10, fontWeight: 600, width: "45%" }}>RAW SOURCE VALUE</th>
                                <th style={{ padding: "6px 8px", textAlign: "center", color: C.muted, fontSize: 10, width: 30 }}>\u2192</th>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.muted, fontSize: 10, fontWeight: 600, width: "40%" }}>EI VALUE</th>
                                <th style={{ padding: "6px 8px", textAlign: "left", color: C.muted, fontSize: 10, fontWeight: 600 }}>VERSION</th>
                              </tr>
                            </thead>
                            <tbody>
                              {filteredMappings.map((m, i) => {
                                const changed = m.ei !== m.raw;
                                return (
                                  <tr key={i} style={{ borderBottom: "1px solid " + C.border + "33" }}>
                                    <td style={{ padding: "6px 8px", fontSize: 12 }}>{m.raw}</td>
                                    <td style={{ padding: "6px 8px", textAlign: "center", color: changed ? color : C.muted, fontSize: 11 }}>
                                      {changed ? "\u2192" : "="}
                                    </td>
                                    <td style={{ padding: "6px 8px", fontSize: 12, color: changed ? color : C.dim }}>
                                      {m.ei}
                                    </td>
                                    <td style={{ padding: "6px 8px" }}><NewEiBadge val={m.new_ei} /></td>
                                  </tr>
                                );
                              })}
                              {filteredMappings.length === 0 && (
                                <tr><td colSpan={4} style={{ padding: 16, textAlign: "center", color: C.muted }}>No matches</td></tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Empty state */}
          {!selectedState && !searchAll && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", color: C.muted }}>
              <div style={{ fontSize: 14, marginBottom: 8 }}>Select a state to view its GRID mappings</div>
              <div style={{ fontSize: 11 }}>Or search across all states using the search box</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GridExplorer />);
</script>
</body>
</html>
