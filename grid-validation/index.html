<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRID Validation Layer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;color:#e2e8f0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px}
.header{padding:16px 24px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:10px;background:#fbbf24;box-shadow:0 0 8px #fbbf2466}
.title{font-size:16px;font-weight:700;letter-spacing:1px}
.subtitle{font-size:11px;color:#64748b;margin-left:8px}
a.link{font-size:11px;color:#38bdf8;text-decoration:none;padding:5px 12px;border:1px solid #38bdf833;border-radius:6px}
.drop{margin:16px 24px;padding:32px 20px;border:2px dashed #1e293b;border-radius:10px;background:#111827;cursor:pointer;text-align:center;transition:all .2s}
.drop.over{border-color:#38bdf8;background:#38bdf80d}
.drop.loaded{padding:12px 20px}
.config{padding:0 24px 16px;display:none}
.config.show{display:block}
.config-label{font-size:11px;color:#64748b;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.config-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.config-row select{padding:6px 10px;background:#111827;border:1px solid #1e293b;border-radius:4px;color:#e2e8f0;font-family:inherit;font-size:12px}
.run-btn{padding:8px 20px;background:#38bdf8;color:#0a0f1a;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px}
.results{padding:0 24px 24px;display:none}
.results.show{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.stat{background:#111827;border-radius:8px;padding:12px 16px;border:1px solid #1e293b}
.stat-label{font-size:11px;color:#64748b;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.green{color:#34d399}.red{color:#f87171}.amber{color:#fbbf24}.blue{color:#38bdf8}
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;border:1px solid #1e293b;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .15s}
.pill.active{border-color:#f87171;background:#f8717118;color:#f87171}
.pill .cnt{font-size:10px;opacity:.7}
.search{padding:8px 14px;background:#111827;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-family:inherit;font-size:13px;width:100%;max-width:400px;margin-bottom:12px;outline:none}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:10px 8px;text-align:left;color:#64748b;font-weight:600;font-size:11px;position:sticky;top:0;background:#0a0f1a;cursor:pointer;user-select:none;white-space:nowrap}
tbody td{padding:7px 8px;border-bottom:1px solid #1e293b11}
tr:nth-child(even){background:#11182744}
.invalid{color:#f87171;font-weight:600}
.badge-invalid{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;background:#7f1d1d;color:#f87171;white-space:nowrap;margin-right:3px}
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;padding:16px 0}
.pg-btn{padding:6px 14px;background:#111827;border:1px solid #1e293b;border-radius:4px;color:#e2e8f0;cursor:pointer;font-family:inherit;font-size:12px}
.pg-btn:disabled{color:#64748b;cursor:default}
.export-btn{padding:6px 14px;font-size:11px;font-family:inherit;background:transparent;border:1px solid #1e293b;border-radius:4px;color:#94a3b8;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="dot"></div>
    <span class="title">GRID VALIDATION</span>
    <span class="subtitle">Data Quality Check</span>
  </div>
  <div style="display:flex;gap:8px">
    <a class="link" href="../grid-explorer/">State Profiles &rarr;</a>
    <a class="link" href="../">&larr; Comparison Tool</a>
  </div>
</div>

<input type="file" id="fileInput" accept=".csv" style="display:none">
<div class="drop" id="dropzone">
  <div id="dropTitle" style="font-size:15px;font-weight:600;margin-bottom:6px">Drop Trevor CSV here</div>
  <div id="dropSub" style="color:#64748b">or click to browse</div>
</div>

<div class="config" id="configSection">
  <div class="config-label">Column Mapping</div>
  <div class="config-row">
    <label style="font-size:11px;color:#94a3b8">State <select id="colState"></select></label>
    <label style="font-size:11px;color:#94a3b8">Status <select id="colStatus"></select></label>
    <label style="font-size:11px;color:#94a3b8">License Type <select id="colLicType"></select></label>
    <label style="font-size:11px;color:#94a3b8">Business Type <select id="colBizType"></select></label>
    <label style="font-size:11px;color:#94a3b8">Facility Type <select id="colFacType"></select></label>
  </div>
  <div class="config-row" style="margin-top:8px">
    <label style="font-size:11px;color:#94a3b8">Company <select id="colName"></select></label>
    <label style="font-size:11px;color:#94a3b8">License # <select id="colLicNum"></select></label>
  </div>
  <button class="run-btn" id="runBtn">Run Validation</button>
</div>

<div class="results" id="resultsSection">
  <div class="stats" id="statsGrid"></div>
  <div class="filters" id="filterRow"></div>
  <input class="search" id="searchBox" placeholder="Search company or license #...">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span id="resultCount" style="font-size:11px;color:#64748b"></span>
    <button class="export-btn" id="exportBtn">&#8595; Export Flagged Rows</button>
  </div>
  <div style="overflow-x:auto"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  <div class="pagination" id="paginationDiv"></div>
</div>

var VALIDATION = VDATA.validation;
var ABBREV = VDATA.abbrevMap;
var PER_PAGE = 50;
var rawRows = [], headers = [], flaggedRows = [], allFlags = [];
var activeFieldFilter = null, currentPage = 0, sortCol = null, sortDir = "asc";

var GUESS = {
  state: ["locationestate","state"],
  status: ["licensestatusvalue","licensestatus","status"],
  licType: ["licensetypevalue","licensetype","lictype"],
  bizType: ["primarybusinesstype","businesstype","segment"],
  facType: ["facilitytype","factype"],
  name: ["name","companyname","company","businessname"],
  licNum: ["displaylicensenumber","licensenumber"]
};

function guessCol(hdrs, hints) {
  var lower = hdrs.map(function(h){return h.toLowerCase().replace(/[^a-z0-9]/g,"")});
  for (var i=0;i<hints.length;i++){
    var h=hints[i].toLowerCase().replace(/[^a-z0-9]/g,"");
    var idx=lower.indexOf(h);
    if(idx>=0) return idx;
  }
  for (var i=0;i<hints.length;i++){
    var h=hints[i].toLowerCase().replace(/[^a-z0-9]/g,"");
    for(var j=0;j<lower.length;j++){
      if(lower[j].indexOf(h)>=0) return j;
    }
  }
  return -1;
}

function parseCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l){return l.trim()});
  return lines.map(function(line) {
    var cols=[], cur="", inQ=false;
    for (var i=0;i<line.length;i++) {
      var ch=line[i];
      if(ch==='"'&&!inQ){inQ=true}
      else if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++}else{inQ=false}}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur=""}
      else{cur+=ch}
    }
    cols.push(cur.trim());
    return cols;
  });
}

var dz = document.getElementById("dropzone");
var fi = document.getElementById("fileInput");

dz.addEventListener("click", function(){fi.click()});
dz.addEventListener("dragover", function(e){e.preventDefault();dz.classList.add("over")});
dz.addEventListener("dragleave", function(){dz.classList.remove("over")});
dz.addEventListener("drop", function(e){e.preventDefault();dz.classList.remove("over");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});
fi.addEventListener("change", function(){if(fi.files[0])handleFile(fi.files[0])});
document.getElementById("runBtn").addEventListener("click", runValidation);
document.getElementById("searchBox").addEventListener("input", function(){currentPage=0;renderTable()});
document.getElementById("exportBtn").addEventListener("click", exportCSV);

function handleFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var parsed = parseCSV(e.target.result);
    headers = parsed[0]||[];
    rawRows = parsed.slice(1);
    dz.classList.add("loaded");
    document.getElementById("dropTitle").innerHTML = '<span style="color:#34d399">\u2713</span> '+file.name;
    document.getElementById("dropSub").textContent = rawRows.length.toLocaleString()+" rows loaded";
    document.getElementById("dropSub").style.color = "#64748b";

    var selIds = {colState:"state",colStatus:"status",colLicType:"licType",colBizType:"bizType",colFacType:"facType",colName:"name",colLicNum:"licNum"};
    var keys = Object.keys(selIds);
    for (var k=0;k<keys.length;k++) {
      var selId = keys[k], gk = selIds[selId];
      var sel = document.getElementById(selId);
      var opts = '<option value="-1">(none)</option>';
      for(var i=0;i<headers.length;i++) opts += '<option value="'+i+'">'+headers[i]+'</option>';
      sel.innerHTML = opts;
      sel.value = guessCol(headers, GUESS[gk]);
    }
    document.getElementById("configSection").classList.add("show");
    document.getElementById("resultsSection").classList.remove("show");
  };
  reader.readAsText(file);
}

function getColVal(id) { return parseInt(document.getElementById(id).value); }

function runValidation() {
  var cs = getColVal("colState"), cst = getColVal("colStatus"), clt = getColVal("colLicType");
  var cbt = getColVal("colBizType"), cft = getColVal("colFacType");
  var cn = getColVal("colName"), cln = getColVal("colLicNum");

  allFlags = [];
  var fieldCounts = {"License Status":0,"License Type":0,"Primary Business Type":0,"Facility Type":0};
  var fMap = [[cst,"License Status"],[clt,"License Type"],[cbt,"Primary Business Type"],[cft,"Facility Type"]];
  var totalChecked=0, totalClean=0, noGrid=0;

  for (var i=0;i<rawRows.length;i++) {
    var row = rawRows[i];
    var stA = (row[cs]||"").trim().toUpperCase();
    var sn = ABBREV[stA];
    var gs = sn ? VALIDATION[sn] : null;
    if (!gs) { if(stA) noGrid++; continue; }
    totalChecked++;
    var rf = [];

    for (var fi2=0;fi2<fMap.length;fi2++) {
      var colIdx = fMap[fi2][0], fn = fMap[fi2][1];
      if (colIdx < 0) continue;
      var val = (row[colIdx]||"").trim();
      if (!val) continue;
      var vs = gs[fn];
      if (!vs) continue;
      var lv = vs.map(function(v){return v.toLowerCase()});
      var parts = val.split("|");
      for (var p=0;p<parts.length;p++) {
        var part = parts[p].trim();
        if (!part) continue;
        if (lv.indexOf(part.toLowerCase()) < 0) {
          rf.push({field:fn, value:part, state:stA});
          fieldCounts[fn]++;
        }
      }
    }

    if (!rf.length) { totalClean++; }
    else {
      allFlags.push({
        rowIdx:i, name:cn>=0?(row[cn]||""):"", licNum:cln>=0?(row[cln]||""):"",
        state:stA, status:cst>=0?(row[cst]||""):"",
        licType:clt>=0?(row[clt]||""):"", bizType:cbt>=0?(row[cbt]||""):"",
        facType:cft>=0?(row[cft]||""):"", flags:rf
      });
    }
  }

  var pct = totalChecked ? ((totalClean/totalChecked)*100).toFixed(1) : "0";
  var statsHTML = [
    {l:"Rows Checked",v:totalChecked.toLocaleString(),c:"blue"},
    {l:"Clean",v:totalClean.toLocaleString(),c:"green"},
    {l:"Flagged",v:allFlags.length.toLocaleString(),c:"red"},
    {l:"Clean %",v:pct+"%",c:parseFloat(pct)>90?"green":"amber"},
    {l:"No GRID Coverage",v:noGrid.toLocaleString(),c:"amber"}
  ].map(function(s){return '<div class="stat"><div class="stat-label">'+s.l+'</div><div class="stat-val '+s.c+'">'+s.v+'</div></div>'}).join("");
  document.getElementById("statsGrid").innerHTML = statsHTML;

  activeFieldFilter = null;
  var fns = Object.keys(fieldCounts).filter(function(f){return fieldCounts[f]>0});
  var filterHTML = '<span style="font-size:11px;color:#64748b;margin-right:4px">FIELD</span>';
  filterHTML += '<button class="pill active" data-field="all">All <span class="cnt">('+allFlags.length+')</span></button>';
  for(var i=0;i<fns.length;i++){
    var f = fns[i];
    var label = f.replace("Primary ","");
    filterHTML += '<button class="pill" data-field="'+f+'">'+label+' <span class="cnt">('+fieldCounts[f]+')</span></button>';
  }
  var filterRow = document.getElementById("filterRow");
  filterRow.innerHTML = filterHTML;
  filterRow.querySelectorAll(".pill").forEach(function(btn){
    btn.addEventListener("click", function(){
      var fld = this.getAttribute("data-field");
      activeFieldFilter = fld === "all" ? null : fld;
      filterRow.querySelectorAll(".pill").forEach(function(b){b.classList.remove("active")});
      this.classList.add("active");
      currentPage = 0;
      renderTable();
    });
  });

  document.getElementById("resultsSection").classList.add("show");
  currentPage=0; sortCol=null;
  renderTable();
}

function esc(s){return String(s||"\u2014").replace(/&/g,"&amp;").replace(/</g,"&lt;")}

function renderTable() {
  var search = document.getElementById("searchBox").value.toLowerCase();
  var rows = allFlags;
  if(activeFieldFilter) rows = rows.filter(function(r){return r.flags.some(function(f){return f.field===activeFieldFilter})});
  if(search) rows = rows.filter(function(r){return r.name.toLowerCase().indexOf(search)>=0||r.licNum.toLowerCase().indexOf(search)>=0});

  if(sortCol) {
    rows = rows.slice().sort(function(a,b){
      var va=(a[sortCol]||"").toLowerCase(), vb=(b[sortCol]||"").toLowerCase();
      if(va<vb) return sortDir==="asc"?-1:1;
      if(va>vb) return sortDir==="asc"?1:-1;
      return 0;
    });
  }

  flaggedRows = rows;
  var tp = Math.ceil(rows.length/PER_PAGE);
  var pr = rows.slice(currentPage*PER_PAGE,(currentPage+1)*PER_PAGE);
  document.getElementById("resultCount").textContent = rows.length.toLocaleString()+" flagged rows";

  var cols = [["name","Company"],["licNum","License #"],["state","ST"],["status","Status"],["licType","License Type"],["bizType","Biz Type"],["facType","Fac Type"]];
  var thHTML = "<tr>";
  for(var i=0;i<cols.length;i++){
    var c=cols[i][0], l=cols[i][1];
    var arrow = sortCol===c?(sortDir==="asc"?" \u25B2":" \u25BC"):"";
    thHTML += '<th data-col="'+c+'">'+l+arrow+'</th>';
  }
  thHTML += "<th>Invalid Values</th></tr>";
  var thead = document.getElementById("thead");
  thead.innerHTML = thHTML;
  thead.querySelectorAll("th[data-col]").forEach(function(th){
    th.addEventListener("click", function(){
      var c = this.getAttribute("data-col");
      if(sortCol===c) sortDir = sortDir==="asc"?"desc":"asc";
      else { sortCol=c; sortDir="asc"; }
      currentPage=0;
      renderTable();
    });
  });

  var tbHTML = "";
  for(var i=0;i<pr.length;i++){
    var r = pr[i];
    var fb = r.flags.filter(function(f){return !activeFieldFilter||f.field===activeFieldFilter})
      .map(function(f){return '<span class="badge-invalid">'+f.field.replace("Primary ","").replace(" Type","")+'</span> <span class="invalid">'+esc(f.value)+'</span>'}).join("&nbsp; ");
    tbHTML += "<tr><td>"+esc(r.name)+"</td><td style='color:#94a3b8'>"+esc(r.licNum)+"</td><td style='font-weight:600'>"+r.state+"</td><td>"+esc(r.status)+"</td><td style='font-size:11px'>"+esc(r.licType)+"</td><td style='font-size:11px'>"+esc(r.bizType)+"</td><td style='font-size:11px'>"+esc(r.facType)+"</td><td>"+fb+"</td></tr>";
  }
  if(!pr.length) tbHTML = '<tr><td colspan="8" style="padding:24px;text-align:center;color:#64748b">No flagged rows</td></tr>';
  document.getElementById("tbody").innerHTML = tbHTML;

  var pgDiv = document.getElementById("paginationDiv");
  if(tp>1){
    pgDiv.innerHTML = '<button class="pg-btn" id="pgPrev">\u2190 Prev</button><span style="color:#94a3b8;font-size:12px">Page '+(currentPage+1)+' of '+tp+'</span><button class="pg-btn" id="pgNext">Next \u2192</button>';
    var prevBtn = document.getElementById("pgPrev");
    var nextBtn = document.getElementById("pgNext");
    if(currentPage===0) prevBtn.disabled=true;
    if(currentPage>=tp-1) nextBtn.disabled=true;
    prevBtn.addEventListener("click",function(){currentPage--;renderTable()});
    nextBtn.addEventListener("click",function(){currentPage++;renderTable()});
  } else { pgDiv.innerHTML=""; }
}

function exportCSV(){
  var h = ["Company","License#","State","Status","LicenseType","BusinessType","FacilityType","InvalidField","InvalidValue"];
  var lines = [h.join(",")];
  for(var i=0;i<flaggedRows.length;i++){
    var r=flaggedRows[i];
    for(var j=0;j<r.flags.length;j++){
      var f=r.flags[j];
      lines.push([r.name,r.licNum,r.state,r.status,r.licType,r.bizType,r.facType,f.field,f.value].map(function(c){return '"'+String(c).replace(/"/g,'""')+'"'}).join(","));
    }
  }
  var blob = new Blob([lines.join("\n")],{type:"text/csv"});
  var a = document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="grid-validation-"+new Date().toISOString().slice(0,10)+".csv"; a.click();
}
